<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DJ Radar · Los Cabos</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet" />

    <style>
        /* ===== RESET & GLOBAL ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            overflow: hidden;
        }

        /* ===== LAYOUT ===== */
        #app {
            display: flex;
            flex-direction: row;
            height: 100vh;
            width: 100vw;
        }

        /* Sidebar */
        #sidebar {
            width: 340px;
            min-width: 340px;
            background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(8px);
            border-right: 2px solid #00d4ff33;
            padding: 20px 16px;
            overflow-y: auto;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 4px 0 30px rgba(0, 0, 0, 0.8);
        }
        #sidebar::-webkit-scrollbar { width: 4px; }
        #sidebar::-webkit-scrollbar-thumb { background: #00d4ff; border-radius: 4px; }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #00d4ff44;
            padding-bottom: 12px;
        }
        .brand i {
            font-size: 2.2rem;
            color: #00d4ff;
            text-shadow: 0 0 20px #00d4ff88;
        }
        .brand h1 {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 1.6rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #00d4ff, #ff00aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .brand small {
            font-size: 0.75rem;
            color: #aaa;
            margin-left: auto;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .clock-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a1a;
            padding: 8px 14px;
            border-radius: 40px;
            border: 1px solid #333;
            font-family: 'Orbitron', monospace;
            font-size: 0.9rem;
            color: #00d4ff;
        }
        .clock-bar .fa-sync {
            cursor: pointer;
            transition: transform 0.4s;
        }
        .clock-bar .fa-sync:hover {
            transform: rotate(180deg);
            color: #ff00aa;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .filter-group button {
            flex: 1;
            padding: 8px 0;
            background: transparent;
            border: 1px solid #444;
            border-radius: 30px;
            color: #ccc;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
        }
        .filter-group button.active {
            border-color: #00d4ff;
            color: #00d4ff;
            background: #00d4ff22;
            box-shadow: 0 0 20px #00d4ff44;
        }
        .filter-group button:hover {
            border-color: #ff00aa;
            color: #ff00aa;
        }

        .control-row {
            display:flex;
            flex-wrap:wrap;
            gap:10px;
            margin-top:10px;
        }
        .search-box {
            flex:1;
            min-width:180px;
            padding:10px 12px;
            border-radius:12px;
            border:1px solid #222;
            background:#0b0b0b;
            color:#e8eef6;
        }
        .status-panel {
            display:flex;
            flex-wrap:wrap;
            gap:8px;
            align-items:center;
            font-size:0.82rem;
            color:#99aabb;
        }
        .status-panel .pill {
            background:#0b0b0b;
            border:1px solid #222;
            border-radius:999px;
            padding:6px 10px;
            display:inline-flex;
            align-items:center;
            gap:6px;
        }

        .dj-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 4px;
        }
        .dj-list .list-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #888;
            border-bottom: 1px solid #222;
            padding-bottom: 6px;
            margin-bottom: 6px;
        }

        .dj-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: #151515;
            border-radius: 12px;
            border-left: 4px solid #333;
            transition: all 0.2s;
            cursor: default;
        }
        .dj-item.active {
            border-left-color: #00ffaa;
            background: #00ffaa0d;
            box-shadow: 0 0 20px #00ffaa22;
        }
        .dj-item .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #00d4ff22;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #00d4ff;
            border: 1px solid #00d4ff44;
        }
        .dj-item.active .avatar {
            border-color: #00ffaa;
            color: #00ffaa;
            box-shadow: 0 0 20px #00ffaa66;
        }
        .dj-item .info { flex: 1; }
        .dj-item .info .name {
            font-weight: 700;
            font-size: 1rem;
            color: #f0f0f0;
        }
        .dj-item .info .venue {
            font-size: 0.8rem;
            color: #aaa;
        }
        .dj-item .info .time {
            font-size: 0.75rem;
            color: #888;
            font-family: 'Orbitron', monospace;
        }
        .dj-item .style-label {
            margin-top: 6px;
            font-size: 0.75rem;
            color: #a0c2ff;
            letter-spacing: 0.4px;
        }
        .dj-item .detail-tag {
            margin-top: 4px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.72rem;
            color: #ffb3b3;
        }
        .dj-item .badge {
            font-size: 0.65rem;
            background: #00d4ff22;
            padding: 2px 10px;
            border-radius: 20px;
            border: 1px solid #00d4ff44;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .dj-item.active .badge {
            background: #00ffaa22;
            border-color: #00ffaa88;
            color: #00ffaa;
        }
        .dj-item {
            cursor: pointer;
        }
        .dj-item:hover {
            transform: translateX(1px);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.12);
        }
        .dj-item .goto-map {
            color: #666;
            cursor: pointer;
            transition: color 0.2s;
        }
        .dj-item .goto-map:hover { color: #00d4ff; }
        .legend-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .legend-panel .pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #c9d8ff;
        }

        .footer {
            border-top: 1px solid #222;
            padding-top: 12px;
            font-size: 0.7rem;
            color: #555;
            text-align: center;
            letter-spacing: 1px;
        }
        .footer a {
            color: #00d4ff;
            text-decoration: none;
        }

        /* ===== MAPA ===== */
        #map {
            flex: 1;
            height: 100vh;
            background: #0a0a0a;
        }

        .custom-marker {
            background: none;
            border: none;
        }
        .custom-marker i {
            font-size: 2rem;
            color: #00d4ff;
            text-shadow: 0 0 30px #00d4ffaa;
            transition: all 0.3s;
        }
        .custom-marker.active i {
            color: #00ffaa;
            text-shadow: 0 0 40px #00ffaa, 0 0 80px #00ffaa66;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        .leaflet-popup-content-wrapper {
            background: #1a1a1a;
            color: #e0e0e0;
            border-radius: 12px;
            border: 1px solid #00d4ff55;
            box-shadow: 0 0 30px #000000aa;
        }
        .leaflet-popup-content {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.95rem;
            line-height: 1.5;
            min-width: 200px;
        }
        .leaflet-popup-content strong { color: #00d4ff; }
        .leaflet-popup-content .venue { color: #aaa; }
        .leaflet-popup-content .time {
            font-family: 'Orbitron', monospace;
            color: #ff00aa;
        }
        .leaflet-popup-tip {
            background: #1a1a1a;
            border: 1px solid #00d4ff55;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            #app {
                flex-direction: column;
            }
            #sidebar {
                width: 100%;
                min-width: unset;
                height: 45vh;
                border-right: none;
                border-bottom: 2px solid #00d4ff33;
                padding: 12px;
            }
            #map {
                height: 55vh;
            }
            .brand h1 { font-size: 1.2rem; }
            .clock-bar { font-size: 0.7rem; }
        }
        /* ===== REVIEW + CHAT PANEL ===== */
        #review-panel {
            position: fixed;
            right: 20px;
            top: 60px;
            width: 380px;
            max-height: calc(100vh - 120px);
            background: #0f1720;
            border: 1px solid #223343;
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            border-radius: 10px;
            padding: 12px;
            overflow: hidden;
            z-index: 2000;
            display: none;
        }
        #review-panel h3 { margin-bottom: 8px; color:#e8f3ff }
        #review-tabs { display:flex; gap:8px; margin-bottom: 10px; }
        #review-tabs button { flex:1; padding:8px 10px; border:1px solid #223343; background:#0a111c; color:#cbd6f0; border-radius:8px; cursor:pointer; }
        #review-tabs button.active { background:#00d4ff; color:#041; border-color:#00d4ff; }
        #review-panel .panel-section { display:none; }
        #review-panel .panel-section.active { display:block; }
        .review-item, .chat-message { padding:8px; border-radius:8px; background:#0b1220; margin-bottom:8px; border:1px solid #172733; }
        .chat-message { display:flex; flex-direction:column; }
        .chat-message .chat-meta { font-size:0.82rem; color:#99aabb; margin-bottom:4px; }
        .review-form textarea, .chat-input textarea { width:100%; min-height:68px; background:#071017; color:#e8f3ff; border:1px solid #223343; padding:8px; border-radius:6px; resize:vertical; }
        .review-controls, .chat-controls { display:flex; gap:8px; margin-top:8px; align-items:center; }
        .chat-input textarea { min-height:50px; }
        .chat-actions { display:flex; gap:8px; align-items:center; margin-top:8px; }
        .chat-actions input { flex:1; padding:8px; border-radius:8px; border:1px solid #223343; background:#071017; color:#e8eef6; }
        .chat-actions button { background:#00d4ff; color:#041; padding:8px 12px; border:none; border-radius:8px; cursor:pointer; }
        .review-form .pill-note { margin-top:6px; font-size:0.82rem; color:#8aa0bf; }
        .panel-body { max-height: calc(100vh - 220px); overflow:auto; padding-right:4px; }
        .panel-body::-webkit-scrollbar { width: 6px; }
        .panel-body::-webkit-scrollbar-thumb { background:#223343; border-radius:4px; }
    </style>
</head>
<body>

<div id="app">
    <!-- SIDEBAR -->
    <div id="sidebar">
        <div class="brand">
            <i class="fas fa-satellite-dish"></i>
            <h1>DJ Radar</h1>
            <small>Los Cabos</small>
        </div>

        <div class="clock-bar">
            <span><i class="far fa-clock"></i> <span id="live-clock">--:--:--</span></span>
            <span><i class="fas fa-sync" id="refresh-btn" title="Actualizar datos"></i></span>
        </div>

        <div class="control-row">
            <div class="status-panel">
                <span class="pill"><strong id="dj-count">0</strong> DJs</span>
                <span class="pill"><strong id="active-count">0</strong> En vivo</span>
                <span class="pill"><strong id="upcoming-count">0</strong> Próximos</span>
            </div>
            <input id="search-input" class="search-box" placeholder="Buscar DJ, venue, estilo...">
            <button id="clear-search" class="pill" title="Limpiar búsqueda">Limpiar</button>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
            <div class="legend-panel">
                <span class="pill"><i class="fas fa-headphones"></i> En vivo</span>
                <span class="pill"><i class="fas fa-clock"></i> Próximo</span>
                <span class="pill"><i class="fas fa-map-marker-alt"></i> Con coordenadas</span>
            </div>
            <span id="last-updated" class="muted" style="font-size:0.85rem">Última carga: --</span>
        </div>

        <div class="filter-group">
            <button class="active" data-filter="all">Todos</button>
            <button data-filter="now">🔴 Ahora</button>
            <button data-filter="next">⏳ Próximos</button>
            <button data-filter="favorites">⭐ Favoritos</button>
        </div>
        <div class="legend-panel">
            <span class="pill"><i class="fas fa-headphones"></i> En vivo</span>
            <span class="pill"><i class="fas fa-clock"></i> Próximo</span>
            <span class="pill"><i class="fas fa-map-marker-alt"></i> Coordenadas disponibles</span>
        </div>

        <div class="dj-list" id="dj-list-container">
            <div class="list-title">DJs en cartel</div>
            <div id="dj-list-items">
                <div style="text-align:center; color:#666; padding:20px;">Cargando...</div>
            </div>
        </div>

        <div class="footer">
            Datos en tiempo real · <a href="#" id="sheet-link" target="_blank">Actualizar hoja</a>
        </div>
    </div>

    <!-- MAPA -->
    <div id="map"></div>
</div>

<!-- ===== LEAFETL JS ===== -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- ===== REVIEW PANEL HTML ===== -->
<div id="review-panel" aria-hidden="true">
    <div style="display:flex;justify-content:space-between;align-items:center;">
        <h3 id="review-title">Reseñas y Chat</h3>
        <button id="close-review" style="background:transparent;border:none;color:#9fbfdc;cursor:pointer;font-size:1.1rem">✖</button>
    </div>
    <div id="review-tabs">
        <button id="tab-reviews" class="active">Reseñas</button>
        <button id="tab-chat">Chat</button>
    </div>
    <div id="review-section" class="panel-section active">
        <div id="review-list" class="panel-body"></div>
        <div style="margin-top:8px">
            <div class="review-form">
                <textarea id="review-text" maxlength="100" placeholder="Escribe una reseña (máx 100 caracteres)"></textarea>
                <div class="emoji-picker" style="margin-top:6px">
                    <button data-emoji="🎧">🎧</button>
                    <button data-emoji="🔥">🔥</button>
                    <button data-emoji="💣">💣</button>
                    <button data-emoji="🤩">🤩</button>
                    <button data-emoji="😴">😴</button>
                    <button data-emoji="👎">👎</button>
                </div>
                <div class="review-controls">
                    <input id="review-nickname" placeholder="Tu apodo (opcional)" style="flex:1;padding:6px;border-radius:6px;background:#071017;border:1px solid #223343;color:#e8f3ff">
                    <button id="submit-review" style="padding:8px 10px;border-radius:6px;background:#00d4ff;color:#001; border:none;cursor:pointer">Enviar</button>
                </div>
                <div class="pill-note">Las reseñas se guardan localmente y se sincronizan con el servidor.</div>
            </div>
        </div>
    </div>
    <div id="chat-section" class="panel-section">
        <div id="chat-list" class="panel-body"></div>
        <div class="chat-actions">
            <input id="chat-nickname" placeholder="Tu apodo" />
            <button id="send-chat">Enviar</button>
        </div>
        <div class="chat-input" style="margin-top:8px">
            <textarea id="chat-text" maxlength="280" placeholder="Escribe un mensaje de chat"></textarea>
        </div>
    </div>
</div>

<!-- ============================================================ -->
<!--  CONFIGURACIÓN DE GOOGLE SHEETS                              -->
<!-- ============================================================ -->
<script>
    window.SHEET_API_URL = window.SHEET_API_URL || '/api/sheet';
    window.SHEET_PUBLIC_URL = window.SHEET_PUBLIC_URL || '';
</script>

<!-- ===== SCRIPTS PRINCIPALES ===== -->
<script>
    (function() {
        'use strict';

        // ============================================================
        //  CONFIGURACIÓN (usa el proxy del backend)
        // ============================================================
        const SHEET_API_URL = window.SHEET_API_URL || window.SHEET_URL || '/api/sheet';
        const SHEET_PUBLIC_URL = window.SHEET_PUBLIC_URL || '';

        const CENTER_LAT = 22.8800;
        const CENTER_LNG = -109.9120;
        const ZOOM_LEVEL = 13;

        // ============================================================
        //  ESTADO
        // ============================================================
        let allDJs = [];
        let currentFilter = 'all';
        let map = null;
        let markersLayer = null;
        let markerById = new Map();

        // ============================================================
        //  SEGUIMIENTOS / localStorage
        // ============================================================
        const LS_FOLLOWED_DJS = 'followedDJs';
        const LS_FOLLOWED_VENUES = 'followedVenues';
        const LS_LAST_FILTER = 'lastFilter';
        const LS_LAST_SEARCH = 'lastSearch';

        function readJSON(key, fallback) {
            try {
                const raw = localStorage.getItem(key);
                return raw ? JSON.parse(raw) : fallback;
            } catch (e) { return fallback; }
        }
        function writeJSON(key, value) {
            try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) { /* ignore */ }
        }

        function getFollowedDJs() {
            return readJSON(LS_FOLLOWED_DJS, []);
        }
        function isDJFollowed(id) {
            return getFollowedDJs().includes(id);
        }
        function toggleFollowDJ(id) {
            const list = getFollowedDJs();
            const idx = list.indexOf(id);
            if (idx === -1) list.push(id); else list.splice(idx, 1);
            writeJSON(LS_FOLLOWED_DJS, list);
            return list.includes(id);
        }

        function getVenueKey(venue) {
            return String(venue || '').trim();
        }
        function getFollowedVenues() {
            return readJSON(LS_FOLLOWED_VENUES, []);
        }
        function isVenueFollowed(venue) {
            return getFollowedVenues().includes(getVenueKey(venue));
        }
        function toggleFollowVenue(venue) {
            const key = getVenueKey(venue);
            const list = getFollowedVenues();
            const idx = list.indexOf(key);
            if (idx === -1) list.push(key); else list.splice(idx, 1);
            writeJSON(LS_FOLLOWED_VENUES, list);
            return list.includes(key);
        }

        // ============================================================
        //  RESEÑAS / localStorage
        // ============================================================
        const LS_REVIEWS = 'userReviews';
        const LS_REVIEW_LIKES = 'reviewLikes';
        
        async function getReviewsFor(id) {
            // Try server first
            try {
                const res = await fetch(`/api/reviews/${encodeURIComponent(id)}`);
                if (res.ok) {
                    const data = await res.json();
                    return Array.isArray(data) ? data : [];
                }
            } catch (e) { /* ignore and fallback to local */ }
            const all = readJSON(LS_REVIEWS, {});
            return all[id] || [];
        }

        async function saveReviewFor(id, review) {
            // Save locally (always)
            try {
                const all = readJSON(LS_REVIEWS, {});
                all[id] = all[id] || [];
                all[id].push(review);
                writeJSON(LS_REVIEWS, all);
            } catch (e) { /* ignore */ }

            // Try to send to server (best-effort)
            try {
                await fetch('/api/reviews', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(Object.assign({ id }, review))
                });
            } catch (e) { /* ignore network errors */ }
        }

        function getReviewLikes() {
            return readJSON(LS_REVIEW_LIKES, {});
        }

        function isReviewLiked(reviewId) {
            const likes = getReviewLikes();
            return likes[reviewId] || false;
        }

        function toggleReviewLike(reviewId) {
            const likes = getReviewLikes();
            likes[reviewId] = !likes[reviewId];
            writeJSON(LS_REVIEW_LIKES, likes);
            return likes[reviewId];
        }

        // Review panel interactions
        const reviewPanel = document.getElementById('review-panel');
        const reviewListEl = document.getElementById('review-list');
        const reviewTitleEl = document.getElementById('review-title');
        const reviewTextEl = document.getElementById('review-text');
        const reviewNickEl = document.getElementById('review-nickname');
        const submitReviewBtn = document.getElementById('submit-review');
        const closeReviewBtn = document.getElementById('close-review');
        let currentReviewTarget = null;

        const tabReviews = document.getElementById('tab-reviews');
        const tabChat = document.getElementById('tab-chat');
        const chatSection = document.getElementById('chat-section');
        const reviewSection = document.getElementById('review-section');
        const chatListEl = document.getElementById('chat-list');
        const chatTextEl = document.getElementById('chat-text');
        const chatNickEl = document.getElementById('chat-nickname');
        const sendChatBtn = document.getElementById('send-chat');
        let currentChatTarget = null;

        function renderReviewPanel(id, name, venue) {
            currentReviewTarget = id;
            currentChatTarget = id;
            reviewTitleEl.textContent = `Reseñas y Chat · ${name || venue || id}`;
            renderReviewsList(id);
            renderChatList(id);
            switchPanel('reviews');
            reviewPanel.style.display = 'block';
            reviewPanel.setAttribute('aria-hidden','false');
        }

        function switchPanel(panel) {
            if (panel === 'reviews') {
                reviewSection.classList.add('active');
                chatSection.classList.remove('active');
                tabReviews.classList.add('active');
                tabChat.classList.remove('active');
            } else {
                reviewSection.classList.remove('active');
                chatSection.classList.add('active');
                tabReviews.classList.remove('active');
                tabChat.classList.add('active');
            }
        }

        function renderReviewsList(id) {
            getReviewsFor(id).then(reviews => {
                if (!reviews.length) {
                    reviewListEl.innerHTML = `<div style="color:#99aabb;padding:8px">Aún no hay reseñas. Sé el primero.</div>`;
                } else {

        // ============================================================
        //  PARSEAR CSV
        // ============================================================
        function parseCSV(csvText) {
            const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== '');
            if (lines.length < 2) return [];

            let delimiter = ',';
            if (lines[0].includes(';') && !lines[0].includes(',')) {
                delimiter = ';';
            }

            function splitRow(row, delim) {
                const result = [];
                let current = '';
                let insideQuotes = false;
                for (let i = 0; i < row.length; i++) {
                    const ch = row[i];
                    if (ch === '"') {
                        insideQuotes = !insideQuotes;
                    } else if (ch === delim && !insideQuotes) {
                        result.push(current.trim());
                        current = '';
                    } else {
                        current += ch;
                    }
                }
                result.push(current.trim());
                return result;
            }

            const headers = splitRow(lines[0], delimiter).map(h => h.replace(/^"|"$/g, '').trim());
            const data = [];
            for (let i = 1; i < lines.length; i++) {
                const row = splitRow(lines[i], delimiter);
                if (row.length < headers.length) continue;
                const obj = {};
                headers.forEach((h, idx) => {
                    let val = row[idx] ? row[idx].replace(/^"|"$/g, '').trim() : '';
                    obj[h] = val;
                });
                data.push(obj);
            }
            return data;
        }

        // ============================================================
        //  NORMALIZAR DJs
        // ============================================================
        function normalizeText(value) {
            return String(value || '')
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '')
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '');
        }

        function getColorForName(name) {
            const text = normalizeText(name || 'dj');
            let hash = 0;
            for (let i = 0; i < text.length; i++) {
                hash = ((hash << 5) - hash) + text.charCodeAt(i);
                hash |= 0;
            }
            const hue = Math.abs(hash) % 360;
            return `hsl(${hue}, 72%, 56%)`;
        }

        function findCol(headers, possibleNames, fallback = '') {
            if (!headers || !headers.length) return fallback;
            const aliases = possibleNames.map(name => normalizeText(name));
            for (const header of headers) {
                const normalized = normalizeText(header);
                if (!normalized) continue;
                const matched = aliases.some(alias => normalized.includes(alias) || alias.includes(normalized));
                if (matched) return header;
            }
            return fallback;
        }

        async function geocodePlace(placeValue) {
            const query = String(placeValue || '').trim();
            if (!query) return null;

            // Try to extract coordinates from common Google Maps / lat,lng patterns before requesting the server
            const coord = extractLatLngFromPlaceString(query);
            if (coord) return coord;

            try {
                const response = await fetch(`/api/geocode?place=${encodeURIComponent(query)}`);
                if (!response.ok) return null;
                const data = await response.json();
                if (!data || !Number.isFinite(data.lat) || !Number.isFinite(data.lng)) return null;
                return { lat: data.lat, lng: data.lng };
            } catch (error) {
                console.warn('Geocoding failed for:', query, error);
                return null;
            }
        }

        // Extract lat/lng from strings like "@12.345,-67.890,15z", "!3d12.345!4d-67.890" or "12.345, -67.890"
        function extractLatLngFromPlaceString(s) {
            if (!s) return null;
            const patterns = [
                /@(-?\d+\.\d+),(-?\d+\.\d+)/,
                /!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/,
                /q=(-?\d+\.\d+),(-?\d+\.\d+)/
            ];
            for (const regex of patterns) {
                const m = s.match(regex);
                if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
            }
            const simple = s.match(/(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)/);
            if (simple) return { lat: parseFloat(simple[1]), lng: parseFloat(simple[2]) };
            return null;
        }

        async function normalizeDJs(rawData) {
            const headers = rawData[0] ? Object.keys(rawData[0]) : [];
            const colDJ = findCol(headers, ['dj', 'name', 'artist', 'artista', 'nombre', 'djs', 'djname', 'artistname'], 'DJ');
            const colVenue = findCol(headers, ['venue', 'lugar', 'club', 'bar', 'sitio', 'location', 'ubicacion', 'direccion', 'place'], 'Venue');
            const colDate = findCol(headers, ['fecha', 'date', 'dia', 'day'], 'Date');
            const colStart = findCol(headers, ['hora inicio', 'hora_inicio', 'inicio', 'start', 'horainicio', 'time start'], 'Start');
            const colEnd = findCol(headers, ['hora fin', 'hora_fin', 'fin', 'ending', 'end', 'horafin', 'time end'], 'Ending');
            const colPlace = findCol(headers, ['lugar / direccion', 'lugar', 'ubicacion', 'direccion', 'place', 'location', 'maps', 'google maps', 'googlemaps', 'link', 'url'], 'Lugar / dirección');
            const colLat = findCol(headers, ['lat', 'latitude', 'latitud', 'coordenadas', 'coordlat'], 'Lat');
            const colLng = findCol(headers, ['lng', 'lon', 'longitude', 'longitud', 'coordlng'], 'Lng');
            const colStyle = findCol(headers, ['music style', 'estilo', 'genero', 'style', 'genre', 'genero musical'], 'Music Style');
            const colStatus = findCol(headers, ['estado', 'status', 'state'], 'Estado');

            const djs = [];
            for (const row of rawData) {
                const status = normalizeText(row[colStatus] || '');
                if (!['aprobado', 'approved', 'active'].includes(status)) continue;

                const djName = row[colDJ] || '';
                const venue = row[colVenue] || '';
                const fecha = row[colDate] || '';
                const start = row[colStart] || '';
                const end = row[colEnd] || '';
                const style = row[colStyle] || '';
                const placeValue = row[colPlace] || venue || '';
                const parsedLat = parseFloat(row[colLat] || row.lat || row.latitud || '');
                const parsedLng = parseFloat(row[colLng] || row.lng || row.longitud || '');
                let lat = Number.isFinite(parsedLat) ? parsedLat : null;
                let lng = Number.isFinite(parsedLng) ? parsedLng : null;

                if (lat === null || lng === null) {
                    // Try to extract coords from the place text (Google Maps links often contain @lat,lng)
                    const extracted = extractLatLngFromPlaceString(placeValue);
                    if (extracted) {
                        lat = extracted.lat;
                        lng = extracted.lng;
                    } else {
                        const geocoded = await geocodePlace(placeValue);
                        if (geocoded) {
                            lat = geocoded.lat;
                            lng = geocoded.lng;
                        }
                    }
                }

                if (!djName && !venue) continue;

                let dateObj = null;
                try {
                    const dateParts = fecha.split('-');
                    if (dateParts.length === 3) {
                        const year = parseInt(dateParts[0]);
                        const month = parseInt(dateParts[1]) - 1;
                        const day = parseInt(dateParts[2]);
                        dateObj = new Date(year, month, day);
                    } else {
                        dateObj = new Date(fecha);
                    }
                } catch (e) { dateObj = null; }

                function timeToMinutes(timeStr) {
                    if (!timeStr) return null;
                    const parts = timeStr.split(':');
                    if (parts.length === 2) {
                        const h = parseInt(parts[0]);
                        const m = parseInt(parts[1]);
                        if (!isNaN(h) && !isNaN(m)) return h * 60 + m;
                    }
                    return null;
                }
                const startMin = timeToMinutes(start);
                const endMin = timeToMinutes(end);

                // Deterministic id so admin overrides can match rows reliably
                const makeId = (a,b,c,d) => encodeURIComponent((normalizeText(a||'') + '_' + normalizeText(b||'') + '_' + String(c||'') + '_' + String(d||'')).replace(/[^a-z0-9_\-]/g, ''));
                djs.push({
                    id: makeId(djName, venue, fecha, start),
                    name: djName,
                    venue,
                    fecha,
                    start,
                    end,
                    startMin,
                    endMin,
                    dateObj,
                    lat,
                    lng,
                    style,
                    color: getColorForName(djName || venue || style || 'dj'),
                    isActive: false
                });
            }
            return djs;
        }

        // ============================================================
        //  ACTUALIZAR ESTADO ACTIVO
        // ============================================================
        function updateActiveStatus(djs) {
            const now = new Date();
            const currentDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const currentMinutes = now.getHours() * 60 + now.getMinutes();

            for (const dj of djs) {
                if (!dj.dateObj || dj.startMin === null || dj.endMin === null) {
                    dj.isActive = false;
                    continue;
                }
                const isSameDay = dj.dateObj.getFullYear() === currentDate.getFullYear() &&
                                  dj.dateObj.getMonth() === currentDate.getMonth() &&
                                  dj.dateObj.getDate() === currentDate.getDate();
                if (!isSameDay) {
                    dj.isActive = false;
                    continue;
                }
                let start = dj.startMin;
                let end = dj.endMin;
                if (end < start) {
                    dj.isActive = (currentMinutes >= start) || (currentMinutes < end);
                } else {
                    dj.isActive = (currentMinutes >= start && currentMinutes < end);
                }
            }
            return djs;
        }

        function isUpcomingDJ(dj) {
            if (!dj.dateObj || dj.startMin === null) return false;
            const now = new Date();
            const currentDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            if (dj.dateObj.getFullYear() !== currentDate.getFullYear() || dj.dateObj.getMonth() !== currentDate.getMonth() || dj.dateObj.getDate() !== currentDate.getDate()) {
                return false;
            }
            const currentMinutes = now.getHours() * 60 + now.getMinutes();
            return dj.startMin > currentMinutes;
        }

        function getSearchTerm() {
            return (searchInput.value || '').trim().toLowerCase();
        }

        function filterDJs(djs) {
            const search = getSearchTerm();
            return djs.filter(dj => {
                if (search) {
                    const text = [dj.name, dj.venue, dj.style, dj.fecha, dj.start, dj.end].join(' ').toLowerCase();
                    if (!text.includes(search)) return false;
                }
                if (currentFilter === 'now') return dj.isActive;
                if (currentFilter === 'next') return !dj.isActive && isUpcomingDJ(dj);
                if (currentFilter === 'favorites') return isDJFollowed(dj.id) || isVenueFollowed(dj.venue);
                return true;
            });
        }

        function updateSummaryCounts(djs) {
            const total = djs.length;
            const active = djs.filter(dj => dj.isActive).length;
            const upcoming = djs.filter(dj => !dj.isActive && isUpcomingDJ(dj)).length;
            djCountEl.textContent = total;
            activeCountEl.textContent = active;
            upcomingCountEl.textContent = upcoming;
        }

        // ============================================================
        //  RENDER LISTA
        // ============================================================
        function renderDJList(djs, filter) {
            const container = document.getElementById('dj-list-items');
            currentFilter = filter;
            const filtered = filterDJs(djs);
            updateSummaryCounts(djs);

            if (filtered.length === 0) {
                container.innerHTML = `<div style="text-align:center; color:#555; padding:20px;">No hay DJs para mostrar</div>`;
                return;
            }

            // Orden: activos primero, luego favoritos, luego el resto
            const sorted = filtered.slice().sort((a,b) => {
                if (a.isActive !== b.isActive) return (a.isActive ? -1 : 1);
                const aFav = (isDJFollowed(a.id) || isVenueFollowed(a.venue));
                const bFav = (isDJFollowed(b.id) || isVenueFollowed(b.venue));
                if (aFav !== bFav) return (aFav ? -1 : 1);
                return String(a.name || '').localeCompare(String(b.name || ''));
            });

            let html = '';
            for (const dj of sorted) {
                const activeClass = dj.isActive ? 'active' : '';
                const upcomingLabel = (!dj.isActive && isUpcomingDJ(dj)) ? '<span class="badge">⏳ PRÓXIMO</span>' : '';
                const badge = dj.isActive ? '<span class="badge">🔴 EN VIVO</span>' : upcomingLabel;
                const icon = dj.isActive ? 'fa-headphones' : 'fa-compact-disc';
                const avatarStyle = `background:${dj.color};box-shadow:0 0 0 2px rgba(255,255,255,0.12);`;

                const isFav = isDJFollowed(dj.id) || isVenueFollowed(dj.venue);
                const followIconClass = isFav ? 'fas fa-star' : 'far fa-star';
                const followColor = isFav ? '#ffd700' : '#666';
                const followBtn = `<span class="follow-btn" data-dj-id="${dj.id}" data-venue="${encodeURIComponent(dj.venue || '')}" title="${isFav ? 'Dejar de seguir' : 'Seguir'}" style="cursor:pointer;color:${followColor};margin-right:8px;"><i class="${followIconClass}"></i></span>`;

                const timeParts = [];
                if (dj.start) timeParts.push(dj.start);
                if (dj.end) timeParts.push(dj.end);
                const timeText = timeParts.length ? timeParts.join(' - ') : '';
                const styleText = dj.style ? `<div class="style-label">${dj.style}</div>` : '';
                const noCoordsHint = (!Number.isFinite(dj.lat) || !Number.isFinite(dj.lng)) ? `<div class="detail-tag"><i class="fas fa-exclamation-circle"></i> Sin coordenadas exactas</div>` : '';

                const gotoMapBtn = (Number.isFinite(dj.lat) && Number.isFinite(dj.lng)) ? `<span class="goto-map" data-lat="${dj.lat}" data-lng="${dj.lng}" title="Centrar en mapa"><i class="fas fa-crosshairs"></i></span>` : '';
                const chatBtn = `<span class="chat-btn" data-dj-id="${dj.id}" title="Abrir chat del evento" style="cursor:pointer;color:#9fbfdc;margin-right:8px;"><i class="fas fa-comments"></i></span>`;

                html += `
                    <div class="dj-item ${activeClass}" data-dj-id="${dj.id}">
                        <div class="avatar" style="${avatarStyle}"><i class="fas ${icon}" style="color:#fff"></i></div>
                        <div class="info">
                            <div class="name">${dj.name}</div>
                            <div class="venue">${dj.venue ? `<i class="fas fa-map-pin" style="color:#888;"></i> ${dj.venue}` : ''}</div>
                            <div class="time">${timeText}</div>
                            ${styleText}
                            ${noCoordsHint}
                        </div>
                        <div style="display:flex;align-items:center;gap:8px;">
                            ${followBtn}
                            ${chatBtn}
                            ${badge}
                            ${gotoMapBtn}
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;

            container.querySelectorAll('.goto-map').forEach(el => {
                el.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const lat = parseFloat(this.dataset.lat);
                    const lng = parseFloat(this.dataset.lng);
                    if (map && !isNaN(lat) && !isNaN(lng)) {
                        map.setView([lat, lng], 15);
                    }
                });
            });

            container.querySelectorAll('.chat-btn').forEach(el => {
                el.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const id = this.dataset.djId;
                    if (id) window.openChatPanel(id, '', '');
                });
            });

            container.querySelectorAll('.dj-item').forEach(item => {
                item.addEventListener('click', () => {
                    const id = item.dataset.djId;
                    const marker = markerById.get(id);
                    if (marker) {
                        map.setView(marker.getLatLng(), 15, { animate: true });
                        marker.openPopup();
                    }
                });
            });

            // Follow button handlers
            container.querySelectorAll('.follow-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const djId = btn.dataset.djId;
                    const venue = decodeURIComponent(btn.dataset.venue || '');
                    if (djId) toggleFollowDJ(djId);
                    else if (venue) toggleFollowVenue(venue);
                    // re-render to update ordering and icons
                    renderDJList(allDJs, currentFilter);
                    renderMarkers(allDJs);
                });
            });
        }

        // ============================================================
        //  RENDER MARCADORES
        // ============================================================
        function renderMarkers(djs) {
            if (!markersLayer) return;
            markersLayer.clearLayers();
            markerById.clear();
            const bounds = L.latLngBounds();

            const filtered = filterDJs(djs);

            for (const dj of filtered) {
                const isFav = isDJFollowed(dj.id) || isVenueFollowed(dj.venue);
                const isActive = dj.isActive;
                const isUpcoming = !dj.isActive && isUpcomingDJ(dj);
                const iconName = isActive ? 'fa-headphones' : (isUpcoming ? 'fa-music' : 'fa-compact-disc');
                const iconHtml = `
                    <div style="width:30px;height:30px;border-radius:50%;background:${dj.color};display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px ${dj.color}77;border:2px solid ${isActive ? '#ffffff' : 'rgba(255,255,255,0.25)'};">
                        <i class="fas ${iconName}" style="color:#fff;font-size:1rem;"></i>
                    </div>
                `;
                const icon = L.divIcon({
                    html: iconHtml,
                    className: 'custom-marker' + (isActive ? ' active' : ''),
                    iconSize: [30, 30],
                    iconAnchor: [15, 15],
                    popupAnchor: [0, -20]
                });
                // Only render markers when we have valid coordinates
                if (Number.isFinite(dj.lat) && Number.isFinite(dj.lng)) {
                    const marker = L.marker([dj.lat, dj.lng], { icon: icon })
                        .addTo(markersLayer)
                        .bindPopup(`
                            <strong>${dj.name}</strong><br>
                                <span class="venue">${dj.venue}</span><br>
                                <span class="time">${dj.start || ''} – ${dj.end || ''}</span><br>
                                ${dj.style ? `<span style="color:#888;">${dj.style}</span>` : ''}
                                ${isActive ? '<br><span style="color:#00ffaa; font-weight:bold;">🔴 EN VIVO AHORA</span>' : ''}
                                <br>
                                <a href="#" onclick="event.preventDefault(); window.toggleFollowDJ('${dj.id}');" style="color:#ffd700; text-decoration:none;">${isFav ? '⭐ Dejar de seguir' : '☆ Seguir'}</a>
                                &nbsp;·&nbsp;
                                <a href="#" onclick="event.preventDefault(); window.openReviewPanel('${dj.id}','${dj.name}','${dj.venue}');" style="color:#9fbfdc; text-decoration:none;">Ver reseñas</a>
                                &nbsp;·&nbsp;
                                <a href="#" onclick="event.preventDefault(); window.openChatPanel('${dj.id}','${dj.name}','${dj.venue}');" style="color:#9fbfdc; text-decoration:none;">Chat</a>
                                &nbsp;·&nbsp;
                                <a href="#" onclick="event.preventDefault(); window.openReviewPanel('${dj.id}','${dj.name}','${dj.venue}'); document.getElementById('review-text').focus();" style="color:#9fbfdc; text-decoration:none;">Dejar reseña</a>
                            `);

                    if (isActive) {
                        L.circle([dj.lat, dj.lng], {
                            radius: 50,
                            color: '#00ffaa',
                            fillColor: '#00ffaa',
                            fillOpacity: 0.2,
                            weight: 2,
                            opacity: 0.6
                        }).addTo(markersLayer);
                    }
                    markerById.set(dj.id, marker);
                    bounds.extend(marker.getLatLng());
                }
            }
            if (bounds.isValid() && map) {
                if (filtered.length === 1) {
                    map.setView(bounds.getCenter(), 14);
                } else {
                    map.fitBounds(bounds.pad(0.18), { animate: true, maxZoom: 15 });
                }
            }
        }

        // ============================================================
        //  CARGA DE DATOS
        // ============================================================
        async function loadData() {
            try {
                document.getElementById('dj-list-items').innerHTML = '<div style="text-align:center; color:#666; padding:20px;">Cargando...</div>';

                const response = await fetch('/api/sheet?t=' + Date.now());
                if (!response.ok) throw new Error('Error al obtener los datos');
                const csvText = await response.text();

                const raw = parseCSV(csvText);
                if (!raw.length) {
                    document.getElementById('dj-list-items').innerHTML = '<div style="text-align:center; color:#555; padding:20px;">No se encontraron datos.</div>';
                    return;
                }

                let djs = await normalizeDJs(raw);
                if (!djs.length) {
                    document.getElementById('dj-list-items').innerHTML = `
                        <div style="text-align:center; color:#8aa0b1; padding:24px 12px; border:1px dashed #2a3b4f; border-radius:12px; background:#101820;">
                            <div style="font-size:1.1rem; margin-bottom:6px; color:#e8f3ff;">No hay DJs aprobados aún</div>
                            <div style="font-size:0.9rem; color:#7d91a8;">Cuando apruebes una solicitud en la hoja, aparecerá aquí automáticamente.</div>
                        </div>
                    `;
                    return;
                }
                djs = updateActiveStatus(djs);
                allDJs = djs;

                if (!djs.length) {
                    document.getElementById('dj-list-items').innerHTML = '<div style="text-align:center; color:#ffaa00; padding:20px;">No se encontraron filas válidas. Revisa los encabezados y los datos de la hoja.</div>';
                    return;
                }

                renderDJList(allDJs, currentFilter);
                renderMarkers(allDJs);
                document.getElementById('last-updated').textContent = 'Última carga: ' + new Date().toLocaleTimeString();
            } catch (error) {
                document.getElementById('last-updated').textContent = 'Última carga: error';
                console.error('Error cargando datos:', error);
                const message = error && error.message ? error.message : 'No se pudieron cargar los datos. Verifica la URL de Google Sheets.';
                document.getElementById('dj-list-items').innerHTML = `<div style="text-align:center; color:#ffaa00; padding:20px;">⚠️ ${message}</div>`;
            }
        }

        // ============================================================
        //  FILTROS
        // ============================================================
        function setFilter(filter) {
            currentFilter = filter;
            filterButtons.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });
            try { localStorage.setItem(LS_LAST_FILTER, filter); } catch (e) {}
            if (allDJs.length) {
                renderDJList(allDJs, filter);
                renderMarkers(allDJs);
            }
        }

        // ============================================================
        //  INICIO
        // ============================================================
        function init() {
            initMap();
            // Restaurar último filtro y búsqueda
            try {
                const lastSearch = localStorage.getItem(LS_LAST_SEARCH) || '';
                const lastFilter = localStorage.getItem(LS_LAST_FILTER) || currentFilter;
                if (lastSearch) searchInput.value = lastSearch;
                currentFilter = lastFilter;
                filterButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.filter === currentFilter));
            } catch (e) { /* ignore */ }

            loadData();

            refreshBtn.addEventListener('click', loadData);
            searchInput.addEventListener('input', () => {
                try { localStorage.setItem(LS_LAST_SEARCH, searchInput.value || ''); } catch (e) {}
                if (allDJs.length) {
                    renderDJList(allDJs, currentFilter);
                    renderMarkers(allDJs);
                }
            });
            clearSearchBtn.addEventListener('click', () => {
                searchInput.value = '';
                if (allDJs.length) {
                    renderDJList(allDJs, currentFilter);
                    renderMarkers(allDJs);
                }
            });

            filterButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    setFilter(this.dataset.filter);
                });
            });

            setInterval(loadData, 60000);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }

    })();
</script>
</body>
</html>
